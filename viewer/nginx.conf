server {
    listen 80;

    # Serve static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy FHIR requests to IRIS — adds auth server-side, no CORS needed
    location /fhir/r4/ {
        proxy_pass http://iris-fhir:52773/csp/healthshare/demo/fhir/r4/;

        proxy_set_header Host iris-fhir;
        proxy_set_header Authorization "Basic X1N5c3RlbTpJU0NERU1P";
        proxy_set_header Accept "application/fhir+json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
